version: "3"

services:

  elasticsearch:
    image: elasticsearch:8
    environment:
      - discovery.type=single-node
    ports:
      - 9200:9200

  kibana:
    image: kibana:8
    ports:
      - 5601:5601

  grafana:
    image: grafana/grafana
    ports:
      - 3000:3000

  prometheus:
    image: prom/prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - 9090:9090

  sensor-agent:
    build: ./services/sensor-agent

  detection-engine:
    build: ./services/detection-engine

  telemetry-api:
    build: ./services/telemetry-api